services:
  # ---------------------------------------------------------------------------
  # ChitChat Laravel Web Service
  # ---------------------------------------------------------------------------
  - type: web
    name: chitchat-app
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/auth/register-phone
    envVars:
      - key: APP_NAME
        value: ChitChat
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://chitchat-app.onrender.com

      # Session & Cache (use redis in production)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis

      # Database (PostgreSQL - auto-linked)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: chitchat-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: chitchat-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: chitchat-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: chitchat-db
          property: password

      # Redis (auto-linked)
      - key: REDIS_HOST
        fromService:
          type: redis
          name: chitchat-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: chitchat-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: chitchat-redis
          property: password

      # Laravel Reverb WebSocket (Broadcasting)
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: "232713"
      - key: REVERB_APP_KEY
        value: "chitchat_reverb_key"
      - key: REVERB_APP_SECRET
        value: "chitchat_reverb_secret"
      - key: REVERB_HOST
        value: "0.0.0.0"
      - key: REVERB_PORT
        value: "8080"
      - key: REVERB_SCHEME
        value: "https"

      # Cloudinary (Media uploads)
      - key: CLOUDINARY_CLOUD_NAME
        value: dhm1bekyz
      - key: CLOUDINARY_API_KEY
        value: "984346342885367"
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set this manually in Render dashboard for security

      # Gemini AI
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in Render dashboard for security

      # Mail
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: hello@chitchat.app
      - key: MAIL_FROM_NAME
        value: ChitChat

      # Logging
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

  # ---------------------------------------------------------------------------
  # Redis Cache & Queue Service
  # ---------------------------------------------------------------------------
  - type: redis
    name: chitchat-redis
    plan: free
    ipAllowList: []

databases:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  - name: chitchat-db
    plan: free
    databaseName: chitchat_db
    user: chitchat_admin
